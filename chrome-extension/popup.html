<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 15px;
      background: #111827;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #00ffff;
    }

    h3 {
      text-align: center;
      margin-bottom: 15px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #00ffff55;
    }

    textarea {
      width: 100%;
      height: 200px;
      margin-top: 10px;
      resize: none;
      background: #1f2937;
      border: 1px solid #00ffff55;
      border-radius: 6px;
      color: #00ffff;
      padding: 8px;
      outline: none;
      box-shadow: 0 0 10px #00ffff22 inset;
      font-family: monospace;
      font-size: 12px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      background: transparent;
      border: 1px solid #00ffff88;
      color: #00ffff;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #00ffff22;
      box-shadow: 0 0 12px #00ffff;
      border: 1px solid #00ffff;
    }

    .neon-line {
      height: 1px;
      background: linear-gradient(to right, transparent, #00ffff, transparent);
      margin: 10px 0;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      margin-top: 10px;
      color: #00ffff55;
    }
  </style>
</head>

<body>

  <h3>Shodan Extractor by randiXploit (Just R)</h3>

  <button id="extractBtn">Extract Results</button>

  <div class="neon-line"></div>

  <textarea id="resultArea" readonly></textarea>

  <button id="copyBtn">Copy Result</button>

  <div class="footer">chrome edition</div>

  <script src="popup.js"></script>
</body>
</html>
